  <main>
    <div class="resume-wrapper">
      <!-- Header with actions and version selector -->
      <div class="resume-header no-print">
        <div class="resume-header-content">
          <div class="resume-mode-switch" role="group" aria-label="Resume mode">
            <button class="mode-btn active" id="readModeBtn" type="button" data-mode="read" aria-pressed="true">Read Mode</button>
            <button class="mode-btn" id="editModeBtn" type="button" data-mode="edit" aria-pressed="false">Edit Mode</button>
          </div>

          <div class="resume-read-meta" id="resumeReadMeta">
            <p class="read-meta-kicker">High-reliability systems engineer</p>
            <p class="read-meta-text">Impact-focused profile for transaction-critical core banking environments.</p>
          </div>

          <div class="resume-edit-panel" id="resumeEditPanel" hidden>
            <div class="version-tabs">
              <p class="version-label">Version:</p>
              <div class="tabs-list" id="variantList" role="tablist">
                <!-- Filled by JS -->
              </div>
            </div>

            <div class="resume-actions">
              <button class="action-btn action-btn-primary" id="btnExportPdf" type="button" title="Download as PDF">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                  <polyline points="7 10 12 15 17 10"></polyline>
                  <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                <span>Download PDF</span>
              </button>
              <button class="action-btn action-btn-secondary" type="button" onclick="printOnePage()" title="Optimize for one page" aria-label="Print optimized for one page">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                  <path d="M7 12h10"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Main resume document -->
      <div class="resume-document">
        <div class="resume-status no-print" id="resumeStatus" aria-live="polite"></div>
        <div class="resume">
          <div class="resume-inner" id="resumeContent">
            <!-- Generated by JavaScript -->
          </div>
        </div>
      </div>
    </div>
