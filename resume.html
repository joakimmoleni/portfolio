<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light dark">

  <title>Joakim - High-Reliability Systems Resume</title>
  <meta name="title" content="Resume - Joakim Moléni, High-Reliability Systems Engineer">
  <meta name="description" content="Impact-focused resume for Joakim Moléni. Transaction-critical core banking systems, IBM z/OS engineering and reliable legacy-modern integration.">

  <!-- Theme colors for mobile UI -->
  <meta name="theme-color" content="#131415" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f7f7f7" media="(prefers-color-scheme: light)">

  <!-- Favicon -->
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;700&display=swap">

  <!-- Main CSS (shared nav styles) -->
  <link rel="stylesheet" href="./assets/css/style.css">
  <!-- Resume-specific CSS -->
  <link rel="stylesheet" href="./assets/css/resume.css">
</head>
<body class="page-resume">

  <!-- Fixed top bar -->
  <header class="resume-topbar no-print">
    <div class="resume-topbar-content">
      <a href="./" class="resume-back-link" aria-label="Back to portfolio">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="width:16px;height:16px;">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        <span>Portfolio</span>
      </a>

      <div class="resume-topbar-center">
        <div class="version-tabs">
          <div class="tabs-list" id="variantList" role="tablist">
            <!-- Filled by JS -->
          </div>
        </div>
      </div>

      <div class="resume-topbar-right">
        <div class="resume-lang-switch" role="group" aria-label="Language">
          <button class="lang-btn active" id="langEnBtn" type="button" data-lang="en" aria-pressed="true">EN</button>
          <button class="lang-btn" id="langSvBtn" type="button" data-lang="sv" aria-pressed="false">SV</button>
        </div>

        <button class="theme-switch" id="themeToggle" aria-label="Toggle dark/light mode">
          <svg id="darkmode" class="icon-moon" viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px;">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
          <svg id="lightmode" class="icon-sun hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>

        <button class="action-btn action-btn-primary" id="btnExportPdf" type="button" title="Download as PDF">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="width:16px;height:16px;">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          <span>PDF</span>
        </button>
      </div>
    </div>
  </header>

  <main>
    <div class="resume-wrapper">
      <div class="resume-document">
        <div class="resume-status no-print" id="resumeStatus" aria-live="polite"></div>
        <div class="resume">
          <div class="resume-inner" id="resumeContent">
            <!-- Generated by JavaScript -->
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="./assets/js/script.js" defer></script>
  <script src="./assets/js/resume.js" defer></script>
</body>
</html>
