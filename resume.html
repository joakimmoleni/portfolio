<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light dark">

  <title>Joakim - High-Reliability Systems Resume</title>
  <meta name="title" content="Resume - Joakim Moléni, High-Reliability Systems Engineer">
  <meta name="description" content="Impact-focused resume for Joakim Moléni. Transaction-critical core banking systems, IBM z/OS engineering and reliable legacy-modern integration.">

  <!-- Theme colors for mobile UI -->
  <meta name="theme-color" content="#131415" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f7f7f7" media="(prefers-color-scheme: light)">

  <!-- Favicon -->
  <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&family=IBM+Plex+Mono:wght@400;500;700&display=swap">

  <!-- Main CSS -->
  <link rel="stylesheet" href="./assets/css/resume.css">
</head>
<body>
  <header>
    <div class="header-content">
      <a href="./" class="logo">Joakim Moléni</a>
      <div class="nav-back">
        <a href="./">Back to Portfolio</a>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <svg id="darkmode" class="icon-moon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
          <svg id="lightmode" class="icon-sun hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main>
    <div class="resume-wrapper">
      <!-- Header with actions and version selector -->
      <div class="resume-header no-print">
        <div class="resume-header-content">
          <div class="resume-mode-switch" role="group" aria-label="Resume mode">
            <button class="mode-btn active" id="readModeBtn" type="button" data-mode="read" aria-pressed="true">Read Mode</button>
            <button class="mode-btn" id="editModeBtn" type="button" data-mode="edit" aria-pressed="false">Edit Mode</button>
          </div>

          <div class="resume-read-meta" id="resumeReadMeta">
            <p class="read-meta-kicker">High-reliability systems engineer</p>
            <p class="read-meta-text">Impact-focused profile for transaction-critical core banking environments.</p>
          </div>

          <div class="resume-edit-panel" id="resumeEditPanel" hidden>
            <div class="version-tabs">
              <p class="version-label">Version:</p>
              <div class="tabs-list" id="variantList" role="tablist">
                <!-- Filled by JS -->
              </div>
            </div>

            <div class="resume-actions">
              <button class="action-btn action-btn-primary" id="btnExportPdf" type="button" title="Download as PDF">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                  <polyline points="7 10 12 15 17 10"></polyline>
                  <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                <span>Download PDF</span>
              </button>
              <button class="action-btn action-btn-secondary" type="button" onclick="printOnePage()" title="Optimize for one page" aria-label="Print optimized for one page">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                  <path d="M7 12h10"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Main resume document -->
      <div class="resume-document">
        <div class="resume-status no-print" id="resumeStatus" aria-live="polite"></div>
        <div class="resume">
          <div class="resume-inner" id="resumeContent">
            <!-- Generated by JavaScript -->
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="./assets/js/resume.js" defer></script>
</body>
</html>
