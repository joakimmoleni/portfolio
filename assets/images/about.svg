<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560">
  <rect width="800" height="560" fill="#0d1410"/>

  <!-- Grid background -->
  <g stroke="#1a2e20" stroke-width="0.5" opacity="0.6">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="280" x2="800" y2="280"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="440" x2="800" y2="440"/>
    <line x1="0" y1="480" x2="800" y2="480"/>
    <line x1="0" y1="520" x2="800" y2="520"/>
    <line x1="40" y1="0" x2="40" y2="560"/>
    <line x1="80" y1="0" x2="80" y2="560"/>
    <line x1="120" y1="0" x2="120" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="560"/>
    <line x1="200" y1="0" x2="200" y2="560"/>
    <line x1="240" y1="0" x2="240" y2="560"/>
    <line x1="280" y1="0" x2="280" y2="560"/>
    <line x1="320" y1="0" x2="320" y2="560"/>
    <line x1="360" y1="0" x2="360" y2="560"/>
    <line x1="400" y1="0" x2="400" y2="560"/>
    <line x1="440" y1="0" x2="440" y2="560"/>
    <line x1="480" y1="0" x2="480" y2="560"/>
    <line x1="520" y1="0" x2="520" y2="560"/>
    <line x1="560" y1="0" x2="560" y2="560"/>
    <line x1="600" y1="0" x2="600" y2="560"/>
    <line x1="640" y1="0" x2="640" y2="560"/>
    <line x1="680" y1="0" x2="680" y2="560"/>
    <line x1="720" y1="0" x2="720" y2="560"/>
    <line x1="760" y1="0" x2="760" y2="560"/>
  </g>

  <!-- Circuit board traces -->
  <!-- Main horizontal bus lines -->
  <g stroke="#1e3d28" stroke-width="2" fill="none">
    <path d="M60 180 L200 180 L200 220 L380 220 L380 180 L500 180"/>
    <path d="M60 300 L140 300 L140 340 L260 340 L260 300 L460 300 L460 260 L600 260"/>
    <path d="M100 420 L220 420 L220 380 L340 380 L340 420 L540 420"/>
    <path d="M500 180 L500 140 L660 140 L660 180 L740 180"/>
    <path d="M600 260 L660 260 L660 300 L740 300"/>
  </g>

  <!-- Teal accent traces -->
  <g stroke="#48bba2" stroke-width="1.5" fill="none" opacity="0.7">
    <path d="M160 220 L160 300"/>
    <path d="M380 220 L380 260 L460 260"/>
    <path d="M260 300 L260 380"/>
    <path d="M500 180 L500 260"/>
    <path d="M340 380 L340 300 L380 300"/>
  </g>

  <!-- Bright teal signal lines -->
  <g stroke="#48bba2" stroke-width="2.5" fill="none" opacity="0.9">
    <path d="M60 260 L120 260 L120 220 L200 220"/>
    <path d="M460 340 L460 420 L540 420"/>
  </g>

  <!-- IC chips -->
  <!-- Chip 1 - center-left -->
  <g transform="translate(180, 240)">
    <rect x="0" y="0" width="100" height="60" rx="3" fill="#0f1e14" stroke="#2a4a32" stroke-width="1.5"/>
    <!-- pins left -->
    <line x1="-8" y1="12" x2="0" y2="12" stroke="#2a4a32" stroke-width="1.5"/>
    <line x1="-8" y1="24" x2="0" y2="24" stroke="#48bba2" stroke-width="1.5"/>
    <line x1="-8" y1="36" x2="0" y2="36" stroke="#2a4a32" stroke-width="1.5"/>
    <line x1="-8" y1="48" x2="0" y2="48" stroke="#2a4a32" stroke-width="1.5"/>
    <!-- pins right -->
    <line x1="100" y1="12" x2="108" y2="12" stroke="#2a4a32" stroke-width="1.5"/>
    <line x1="100" y1="24" x2="108" y2="24" stroke="#2a4a32" stroke-width="1.5"/>
    <line x1="100" y1="36" x2="108" y2="36" stroke="#48bba2" stroke-width="1.5"/>
    <line x1="100" y1="48" x2="108" y2="48" stroke="#2a4a32" stroke-width="1.5"/>
    <!-- notch -->
    <circle cx="8" cy="8" r="4" fill="none" stroke="#3a5a42" stroke-width="1"/>
    <!-- label -->
    <text x="50" y="28" font-family="'Courier New', monospace" font-size="8" fill="#48bba2" text-anchor="middle" opacity="0.8">MCU-01</text>
    <text x="50" y="40" font-family="'Courier New', monospace" font-size="7" fill="#2a5a3a" text-anchor="middle">SYS_CTRL</text>
  </g>

  <!-- Chip 2 - upper right -->
  <g transform="translate(560, 120)">
    <rect x="0" y="0" width="80" height="80" rx="3" fill="#0f1e14" stroke="#2a4a32" stroke-width="1.5"/>
    <line x1="-8" y1="16" x2="0" y2="16" stroke="#2a4a32" stroke-width="1.5"/>
    <line x1="-8" y1="32" x2="0" y2="32" stroke="#48bba2" stroke-width="1.5"/>
    <line x1="-8" y1="48" x2="0" y2="48" stroke="#2a4a32" stroke-width="1.5"/>
    <line x1="-8" y1="64" x2="0" y2="64" stroke="#2a4a32" stroke-width="1.5"/>
    <line x1="80" y1="16" x2="88" y2="16" stroke="#48bba2" stroke-width="1.5"/>
    <line x1="80" y1="32" x2="88" y2="32" stroke="#2a4a32" stroke-width="1.5"/>
    <line x1="80" y1="48" x2="88" y2="48" stroke="#2a4a32" stroke-width="1.5"/>
    <line x1="80" y1="64" x2="88" y2="64" stroke="#48bba2" stroke-width="1.5"/>
    <line x1="16" y1="-8" x2="16" y2="0" stroke="#2a4a32" stroke-width="1.5"/>
    <line x1="32" y1="-8" x2="32" y2="0" stroke="#48bba2" stroke-width="1.5"/>
    <line x1="48" y1="-8" x2="48" y2="0" stroke="#2a4a32" stroke-width="1.5"/>
    <line x1="64" y1="-8" x2="64" y2="0" stroke="#2a4a32" stroke-width="1.5"/>
    <circle cx="8" cy="8" r="4" fill="none" stroke="#3a5a42" stroke-width="1"/>
    <text x="40" y="35" font-family="'Courier New', monospace" font-size="8" fill="#48bba2" text-anchor="middle" opacity="0.8">MEM-32</text>
    <text x="40" y="48" font-family="'Courier New', monospace" font-size="7" fill="#2a5a3a" text-anchor="middle">256K</text>
  </g>

  <!-- Chip 3 - lower -->
  <g transform="translate(380, 360)">
    <rect x="0" y="0" width="120" height="50" rx="3" fill="#0f1e14" stroke="#2a4a32" stroke-width="1.5"/>
    <line x1="-8" y1="12" x2="0" y2="12" stroke="#48bba2" stroke-width="1.5"/>
    <line x1="-8" y1="25" x2="0" y2="25" stroke="#2a4a32" stroke-width="1.5"/>
    <line x1="-8" y1="38" x2="0" y2="38" stroke="#2a4a32" stroke-width="1.5"/>
    <line x1="120" y1="12" x2="128" y2="12" stroke="#2a4a32" stroke-width="1.5"/>
    <line x1="120" y1="25" x2="128" y2="25" stroke="#48bba2" stroke-width="1.5"/>
    <line x1="120" y1="38" x2="128" y2="38" stroke="#2a4a32" stroke-width="1.5"/>
    <line x1="20" y1="50" x2="20" y2="58" stroke="#2a4a32" stroke-width="1.5"/>
    <line x1="40" y1="50" x2="40" y2="58" stroke="#48bba2" stroke-width="1.5"/>
    <line x1="60" y1="50" x2="60" y2="58" stroke="#2a4a32" stroke-width="1.5"/>
    <line x1="80" y1="50" x2="80" y2="58" stroke="#2a4a32" stroke-width="1.5"/>
    <line x1="100" y1="50" x2="100" y2="58" stroke="#48bba2" stroke-width="1.5"/>
    <circle cx="8" cy="8" r="4" fill="none" stroke="#3a5a42" stroke-width="1"/>
    <text x="60" y="22" font-family="'Courier New', monospace" font-size="8" fill="#48bba2" text-anchor="middle" opacity="0.8">I/O CTRL</text>
    <text x="60" y="34" font-family="'Courier New', monospace" font-size="7" fill="#2a5a3a" text-anchor="middle">BUS-BRIDGE</text>
  </g>

  <!-- Resistors -->
  <g fill="#1a3020" stroke="#2a4a32" stroke-width="1">
    <rect x="100" y="175" width="20" height="10" rx="2"/>
    <rect x="100" y="255" width="20" height="10" rx="2"/>
    <rect x="440" y="175" width="20" height="10" rx="2"/>
    <rect x="440" y="295" width="20" height="10" rx="2"/>
    <rect x="300" y="335" width="20" height="10" rx="2"/>
    <rect x="300" y="415" width="20" height="10" rx="2"/>
  </g>
  <!-- Resistor stripes -->
  <g stroke="#48bba2" stroke-width="1" opacity="0.5">
    <line x1="106" y1="175" x2="106" y2="185"/>
    <line x1="110" y1="175" x2="110" y2="185"/>
    <line x1="114" y1="175" x2="114" y2="185"/>
    <line x1="106" y1="255" x2="106" y2="265"/>
    <line x1="110" y1="255" x2="110" y2="265"/>
    <line x1="440" y1="256" x2="440" y2="266"/>
    <line x1="444" y1="256" x2="444" y2="266"/>
    <line x1="448" y1="256" x2="448" y2="266"/>
  </g>

  <!-- Capacitors -->
  <g stroke="#48bba2" stroke-width="1.5" opacity="0.6">
    <line x1="350" y1="170" x2="360" y2="170"/>
    <line x1="350" y1="174" x2="360" y2="174"/>
    <line x1="355" y1="160" x2="355" y2="168"/>
    <line x1="355" y1="176" x2="355" y2="185"/>

    <line x1="240" y1="290" x2="250" y2="290"/>
    <line x1="240" y1="294" x2="250" y2="294"/>
    <line x1="245" y1="280" x2="245" y2="288"/>
    <line x1="245" y1="296" x2="245" y2="306"/>
  </g>

  <!-- Via dots -->
  <g fill="#48bba2" opacity="0.7">
    <circle cx="200" cy="220" r="3"/>
    <circle cx="380" cy="220" r="3"/>
    <circle cx="260" cy="300" r="3"/>
    <circle cx="460" cy="300" r="3"/>
    <circle cx="340" cy="380" r="3"/>
    <circle cx="500" cy="180" r="3"/>
    <circle cx="160" cy="300" r="3"/>
    <circle cx="380" cy="300" r="3"/>
  </g>

  <!-- Small LED indicator -->
  <circle cx="680" cy="400" r="10" fill="#0a1e12" stroke="#48bba2" stroke-width="1.5"/>
  <circle cx="680" cy="400" r="5" fill="#48bba2" opacity="0.9"/>
  <circle cx="680" cy="400" r="5" fill="#48bba2" opacity="0.3">
    <animate attributeName="r" values="5;9;5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.0;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Another LED -->
  <circle cx="720" cy="440" r="8" fill="#0a1e12" stroke="#2a4a32" stroke-width="1.5"/>
  <circle cx="720" cy="440" r="4" fill="#1e5a32" opacity="0.6"/>

  <!-- Corner mounting holes -->
  <circle cx="30" cy="30" r="8" fill="none" stroke="#1a2e20" stroke-width="1.5"/>
  <circle cx="30" cy="30" r="3" fill="#0a1008"/>
  <circle cx="770" cy="30" r="8" fill="none" stroke="#1a2e20" stroke-width="1.5"/>
  <circle cx="770" cy="30" r="3" fill="#0a1008"/>
  <circle cx="30" cy="530" r="8" fill="none" stroke="#1a2e20" stroke-width="1.5"/>
  <circle cx="30" cy="530" r="3" fill="#0a1008"/>
  <circle cx="770" cy="530" r="8" fill="none" stroke="#1a2e20" stroke-width="1.5"/>
  <circle cx="770" cy="530" r="3" fill="#0a1008"/>

  <!-- Connector header top-left -->
  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="80" height="24" rx="2" fill="#0c1810" stroke="#2a4a32" stroke-width="1"/>
    <rect x="4" y="4" width="12" height="16" rx="1" fill="#1a3020" stroke="#3a5a42" stroke-width="0.5"/>
    <rect x="20" y="4" width="12" height="16" rx="1" fill="#1a3020" stroke="#48bba2" stroke-width="0.5"/>
    <rect x="36" y="4" width="12" height="16" rx="1" fill="#1a3020" stroke="#3a5a42" stroke-width="0.5"/>
    <rect x="52" y="4" width="12" height="16" rx="1" fill="#1a3020" stroke="#3a5a42" stroke-width="0.5"/>
    <rect x="68" y="4" width="8" height="16" rx="1" fill="#1a3020" stroke="#3a5a42" stroke-width="0.5"/>
    <text x="40" y="36" font-family="'Courier New', monospace" font-size="7" fill="#2a5a3a" text-anchor="middle">J1</text>
  </g>

  <!-- Silkscreen text labels -->
  <text x="180" y="310" font-family="'Courier New', monospace" font-size="9" fill="#1e4028" opacity="0.8">U1</text>
  <text x="560" y="118" font-family="'Courier New', monospace" font-size="9" fill="#1e4028" opacity="0.8">U2</text>
  <text x="380" y="358" font-family="'Courier New', monospace" font-size="9" fill="#1e4028" opacity="0.8">U3</text>
  <text x="660" y="395" font-family="'Courier New', monospace" font-size="9" fill="#2a5a3a" opacity="0.8">D1</text>

  <!-- PCB edge notch -->
  <rect x="380" y="0" width="40" height="8" rx="0" fill="#080e0a"/>
</svg>
