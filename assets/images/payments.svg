<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#0d1018"/>

  <!-- Deep background glow -->
  <ellipse cx="400" cy="250" rx="320" ry="180" fill="#0a1a2a" opacity="0.8"/>

  <!-- Grid -->
  <g stroke="#111820" stroke-width="0.5" opacity="0.8">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="700" y1="0" x2="700" y2="500"/>
  </g>

  <!-- Transaction flow path - main artery -->
  <path d="M80 250 C180 250 180 250 280 250 C340 250 340 250 400 250 C460 250 460 250 520 250 C620 250 620 250 720 250"
        stroke="#48bba2" stroke-width="2" fill="none" opacity="0.3"/>

  <!-- Animated signal pulses on the main line -->
  <circle cx="0" cy="250" r="4" fill="#48bba2" opacity="0.9">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M80 250 L720 250"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="0" cy="250" r="3" fill="#ffffff" opacity="0.6">
    <animateMotion dur="2.5s" begin="1.2s" repeatCount="indefinite" path="M80 250 L720 250"/>
    <animate attributeName="opacity" values="0;0.6;0.6;0" dur="2.5s" begin="1.2s" repeatCount="indefinite"/>
  </circle>

  <!-- NODE: Sender (left) -->
  <g transform="translate(80, 210)">
    <rect x="-40" y="-35" width="80" height="80" rx="8" fill="#0d1a14" stroke="#48bba2" stroke-width="1.5"/>
    <!-- card icon -->
    <rect x="-22" y="-16" width="44" height="30" rx="3" fill="#1a3020" stroke="#48bba2" stroke-width="1"/>
    <rect x="-22" y="-6" width="44" height="8" fill="#48bba2" opacity="0.3"/>
    <rect x="-16" y="6" width="12" height="4" rx="1" fill="#48bba2" opacity="0.5"/>
    <text x="0" y="34" font-family="'Courier New', monospace" font-size="8" fill="#48bba2" text-anchor="middle">SENDER</text>
  </g>

  <!-- NODE: Bank A -->
  <g transform="translate(240, 170)">
    <rect x="-35" y="-35" width="70" height="70" rx="6" fill="#0d1a14" stroke="#2a6a4a" stroke-width="1"/>
    <!-- server rack icon -->
    <rect x="-18" y="-20" width="36" height="8" rx="2" fill="#1a3020" stroke="#2a6a4a" stroke-width="0.5"/>
    <rect x="-18" y="-8" width="36" height="8" rx="2" fill="#1a3020" stroke="#48bba2" stroke-width="0.5"/>
    <rect x="-18" y="4" width="36" height="8" rx="2" fill="#1a3020" stroke="#2a6a4a" stroke-width="0.5"/>
    <circle cx="10" cy="-16" r="2" fill="#48bba2" opacity="0.7"/>
    <circle cx="10" cy="-4" r="2" fill="#48bba2"/>
    <circle cx="10" cy="8" r="2" fill="#2a4a32" opacity="0.5"/>
    <text x="0" y="30" font-family="'Courier New', monospace" font-size="8" fill="#48bba2" text-anchor="middle">BANK-A</text>
  </g>

  <!-- Connector line bank A to main -->
  <line x1="240" y1="205" x2="240" y2="250" stroke="#48bba2" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
  <circle cx="240" cy="250" r="3" fill="#48bba2" opacity="0.6"/>

  <!-- NODE: Clearing (center) - bigger, more prominent -->
  <g transform="translate(400, 250)">
    <circle cx="0" cy="0" r="50" fill="#0d1a14" stroke="#48bba2" stroke-width="2" opacity="0.15"/>
    <circle cx="0" cy="0" r="36" fill="#0d1a14" stroke="#48bba2" stroke-width="1.5"/>
    <!-- SEPA/clearing symbol -->
    <text x="0" y="-6" font-family="'Courier New', monospace" font-size="10" fill="#48bba2" text-anchor="middle" font-weight="bold">SCT</text>
    <text x="0" y="8" font-family="'Courier New', monospace" font-size="7" fill="#48bba2" text-anchor="middle">INST</text>
    <!-- Pulse ring -->
    <circle cx="0" cy="0" r="36" fill="none" stroke="#48bba2" stroke-width="1" opacity="0.4">
      <animate attributeName="r" values="36;52;36" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- NODE: Bank B -->
  <g transform="translate(560, 170)">
    <rect x="-35" y="-35" width="70" height="70" rx="6" fill="#0d1a14" stroke="#2a6a4a" stroke-width="1"/>
    <rect x="-18" y="-20" width="36" height="8" rx="2" fill="#1a3020" stroke="#2a6a4a" stroke-width="0.5"/>
    <rect x="-18" y="-8" width="36" height="8" rx="2" fill="#1a3020" stroke="#48bba2" stroke-width="0.5"/>
    <rect x="-18" y="4" width="36" height="8" rx="2" fill="#1a3020" stroke="#2a6a4a" stroke-width="0.5"/>
    <circle cx="10" cy="-16" r="2" fill="#2a4a32" opacity="0.5"/>
    <circle cx="10" cy="-4" r="2" fill="#48bba2"/>
    <circle cx="10" cy="8" r="2" fill="#48bba2" opacity="0.7"/>
    <text x="0" y="30" font-family="'Courier New', monospace" font-size="8" fill="#48bba2" text-anchor="middle">BANK-B</text>
  </g>
  <line x1="560" y1="205" x2="560" y2="250" stroke="#48bba2" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>
  <circle cx="560" cy="250" r="3" fill="#48bba2" opacity="0.6"/>

  <!-- NODE: Receiver (right) -->
  <g transform="translate(720, 210)">
    <rect x="-40" y="-35" width="80" height="80" rx="8" fill="#0d1a14" stroke="#48bba2" stroke-width="1.5"/>
    <rect x="-22" y="-16" width="44" height="30" rx="3" fill="#1a3020" stroke="#48bba2" stroke-width="1"/>
    <rect x="-22" y="-6" width="44" height="8" fill="#48bba2" opacity="0.3"/>
    <rect x="-16" y="6" width="12" height="4" rx="1" fill="#48bba2" opacity="0.5"/>
    <text x="0" y="34" font-family="'Courier New', monospace" font-size="8" fill="#48bba2" text-anchor="middle">RECEIVER</text>
  </g>

  <!-- Secondary nodes - regulators/risk -->
  <g transform="translate(300, 370)">
    <rect x="-30" y="-20" width="60" height="40" rx="4" fill="#0d1a14" stroke="#1a3a2a" stroke-width="1"/>
    <text x="0" y="-4" font-family="'Courier New', monospace" font-size="7" fill="#2a6a4a" text-anchor="middle">RISK</text>
    <text x="0" y="8" font-family="'Courier New', monospace" font-size="7" fill="#2a6a4a" text-anchor="middle">ENGINE</text>
  </g>
  <line x1="300" y1="350" x2="360" y2="290" stroke="#1a3a2a" stroke-width="1" stroke-dasharray="2 4" opacity="0.4"/>

  <g transform="translate(500, 370)">
    <rect x="-30" y="-20" width="60" height="40" rx="4" fill="#0d1a14" stroke="#1a3a2a" stroke-width="1"/>
    <text x="0" y="-4" font-family="'Courier New', monospace" font-size="7" fill="#2a6a4a" text-anchor="middle">FRAUD</text>
    <text x="0" y="8" font-family="'Courier New', monospace" font-size="7" fill="#2a6a4a" text-anchor="middle">DETECT</text>
  </g>
  <line x1="500" y1="350" x2="440" y2="290" stroke="#1a3a2a" stroke-width="1" stroke-dasharray="2 4" opacity="0.4"/>

  <!-- Latency label -->
  <text x="400" y="320" font-family="'Courier New', monospace" font-size="9" fill="#48bba2" text-anchor="middle" opacity="0.6">&lt; 10 SEC END-TO-END</text>

  <!-- Top status bar -->
  <rect x="60" y="40" width="680" height="28" rx="4" fill="#0a1418" stroke="#1a2a20" stroke-width="1"/>
  <circle cx="80" cy="54" r="4" fill="#48bba2" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="94" y="58" font-family="'Courier New', monospace" font-size="8" fill="#48bba2" opacity="0.7">LIVE</text>
  <text x="130" y="58" font-family="'Courier New', monospace" font-size="8" fill="#2a5a3a">TX_COUNT: 847,291</text>
  <text x="310" y="58" font-family="'Courier New', monospace" font-size="8" fill="#2a5a3a">AVG_LATENCY: 4.2s</text>
  <text x="490" y="58" font-family="'Courier New', monospace" font-size="8" fill="#2a5a3a">UPTIME: 99.997%</text>
  <text x="670" y="58" font-family="'Courier New', monospace" font-size="8" fill="#48bba2" opacity="0.5">EU-ZONE</text>

  <!-- Signal wave visualizer at bottom -->
  <g transform="translate(0, 430)" opacity="0.5">
    <path d="M60 30 L100 30 L110 10 L120 50 L130 20 L140 40 L150 30 L200 30 L210 15 L220 45 L230 30 L280 30 L290 8 L300 52 L310 30 L360 30 L370 18 L380 42 L390 30 L440 30 L450 12 L460 48 L470 30 L520 30 L530 22 L540 38 L550 30 L600 30 L610 6 L620 54 L630 30 L680 30 L690 20 L700 40 L710 30 L740 30"
          stroke="#48bba2" stroke-width="1.5" fill="none"/>
  </g>
  <text x="400" y="490" font-family="'Courier New', monospace" font-size="7" fill="#1a4028" text-anchor="middle">TX SIGNAL / HEARTBEAT</text>
</svg>
