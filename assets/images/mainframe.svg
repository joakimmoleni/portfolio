    <circle cx="76" cy="37" r="2.5" fill="#48bba2" opacity="0.6"/>
    <circle cx="76" cy="59" r="2.5" fill="#48bba2" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.2;0.9" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="76" cy="81" r="2.5" fill="#48bba2" opacity="0.4"/>
    <rect x="10" y="104" width="4" height="4" rx="1" fill="#48bba2" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.1;0.9" dur="0.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="18" y="104" width="4" height="4" rx="1" fill="#48bba2" opacity="0.7"/>
    <rect x="26" y="104" width="4" height="4" rx="1" fill="#1a3a2a" opacity="0.3"/>
    <rect x="34" y="104" width="4" height="4" rx="1" fill="#48bba2" opacity="0.8"/>
  </g>

  <!-- Far right rack -->
  <g transform="translate(630, 60)">
    <rect x="0" y="0" width="80" height="240" rx="3" fill="#0c1014" stroke="#1a2830" stroke-width="1"/>
    <g fill="#111820" stroke="#1e2e3a" stroke-width="0.5">
      <rect x="4" y="4" width="72" height="6" rx="1"/>
      <rect x="4" y="14" width="72" height="6" rx="1"/>
      <rect x="4" y="24" width="72" height="20" rx="1"/>
      <rect x="4" y="48" width="72" height="20" rx="1"/>
      <rect x="4" y="72" width="72" height="20" rx="1"/>
      <rect x="4" y="96" width="72" height="130" rx="1"/>
    </g>
    <circle cx="68" cy="34" r="2" fill="#1a3a2a" opacity="0.4"/>
    <circle cx="68" cy="58" r="2" fill="#48bba2" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Overhead cable trays -->
  <rect x="0" y="295" width="260" height="8" rx="2" fill="#0e1520" stroke="#1a2838" stroke-width="0.5" opacity="0.8"/>
  <rect x="500" y="295" width="260" height="8" rx="2" fill="#0e1520" stroke="#1a2838" stroke-width="0.5" opacity="0.8"/>
  <!-- Cables hanging down -->
  <g stroke="#0e1828" stroke-width="1.5" opacity="0.5">
    <path d="M90 303 Q90 350 70 380"/>
    <path d="M130 303 Q130 340 150 370"/>
    <path d="M170 303 Q180 360 160 400"/>
    <path d="M600 303 Q610 360 590 400"/>
    <path d="M640 303 Q630 350 660 380"/>
    <path d="M680 303 Q690 340 670 370"/>
  </g>

  <!-- Teal fiber cables -->
  <path d="M0 310 Q130 310 260 310" stroke="#48bba2" stroke-width="1" fill="none" opacity="0.2"/>
  <path d="M500 310 Q630 310 760 310" stroke="#48bba2" stroke-width="1" fill="none" opacity="0.2"/>

  <!-- Ground stats overlay bottom right -->
  <rect x="570" y="420" width="170" height="80" rx="4" fill="#090d12" stroke="#1a2838" stroke-width="1" opacity="0.95"/>
  <text x="584" y="438" font-family="'Courier New', monospace" font-size="8" fill="#48bba2" opacity="0.8">SYSTEM STATUS</text>
  <text x="584" y="454" font-family="'Courier New', monospace" font-size="8" fill="#2a5a4a">CPU UTIL:  94.2%</text>
  <text x="584" y="468" font-family="'Courier New', monospace" font-size="8" fill="#2a5a4a">MEM:       98.7%</text>
  <text x="584" y="482" font-family="'Courier New', monospace" font-size="8" fill="#2a5a4a">TX/SEC:    182,441</text>
  <text x="584" y="496" font-family="'Courier New', monospace" font-size="8" fill="#48bba2" opacity="0.6">ALL SYSTEMS NOMINAL</text>
</svg>
