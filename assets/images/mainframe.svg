<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" width="760" height="520">
  <rect width="760" height="520" fill="#090c0e"/>

  <!-- Floor perspective lines -->
  <polygon points="0,520 760,520 500,300 260,300" fill="#0a0d10" opacity="0.6"/>
  <line x1="0" y1="520" x2="260" y2="300" stroke="#111820" stroke-width="0.5"/>
  <line x1="760" y1="520" x2="500" y2="300" stroke="#111820" stroke-width="0.5"/>

  <!-- Ceiling perspective lines -->
  <polygon points="0,0 760,0 500,300 260,300" fill="#090c0e" opacity="0.4"/>
  <line x1="0" y1="0" x2="260" y2="300" stroke="#111820" stroke-width="0.5"/>
  <line x1="760" y1="0" x2="500" y2="300" stroke="#111820" stroke-width="0.5"/>

  <!-- Ceiling lights -->
  <rect x="300" y="0" width="160" height="6" rx="2" fill="#48bba2" opacity="0.15"/>
  <rect x="310" y="0" width="140" height="3" rx="1" fill="#48bba2" opacity="0.3"/>
  <!-- Ceiling light glow -->
  <ellipse cx="380" cy="20" rx="100" ry="30" fill="#48bba2" opacity="0.04"/>

  <!-- Floor tiles perspective -->
  <g stroke="#0f1418" stroke-width="0.5" opacity="0.7">
    <!-- Horizontal floor lines converging to vanishing point ~380,300 -->
    <line x1="0" y1="370" x2="760" y2="370"/>
    <line x1="0" y1="420" x2="760" y2="420"/>
    <line x1="0" y1="470" x2="760" y2="470"/>
    <!-- Vertical floor lines -->
    <line x1="100" y1="300" x2="80" y2="520"/>
    <line x1="200" y1="300" x2="170" y2="520"/>
    <line x1="300" y1="300" x2="280" y2="520"/>
    <line x1="380" y1="300" x2="380" y2="520"/>
    <line x1="460" y1="300" x2="480" y2="520"/>
    <line x1="560" y1="300" x2="590" y2="520"/>
    <line x1="660" y1="300" x2="680" y2="520"/>
  </g>

  <!-- LEFT rack row -->
  <!-- Rack 1 (furthest) -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="80" height="240" rx="3" fill="#0c1014" stroke="#1a2830" stroke-width="1"/>
    <!-- rack units -->
    <g fill="#111820" stroke="#1e2e3a" stroke-width="0.5">
      <rect x="4" y="4" width="72" height="6" rx="1"/>
      <rect x="4" y="14" width="72" height="6" rx="1"/>
      <rect x="4" y="24" width="72" height="14" rx="1"/>
      <rect x="4" y="42" width="72" height="14" rx="1"/>
      <rect x="4" y="60" width="72" height="14" rx="1"/>
      <rect x="4" y="78" width="72" height="30" rx="1"/>
      <rect x="4" y="112" width="72" height="30" rx="1"/>
      <rect x="4" y="146" width="72" height="30" rx="1"/>
      <rect x="4" y="180" width="72" height="14" rx="1"/>
      <rect x="4" y="198" width="72" height="14" rx="1"/>
      <rect x="4" y="216" width="72" height="20" rx="1"/>
    </g>
    <!-- activity lights -->
    <circle cx="68" cy="31" r="2" fill="#48bba2" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.1;0.8" dur="0.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="68" cy="49" r="2" fill="#48bba2" opacity="0.6"/>
    <circle cx="68" cy="67" r="2" fill="#1a4a2a" opacity="0.4"/>
    <circle cx="14" cy="93" r="3" fill="#48bba2" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Rack 2 -->
  <g transform="translate(145, 40)">
    <rect x="0" y="0" width="88" height="270" rx="3" fill="#0c1014" stroke="#1e2e3a" stroke-width="1.5"/>
    <g fill="#111820" stroke="#1e2e3a" stroke-width="0.5">
      <rect x="4" y="4" width="80" height="8" rx="1"/>
      <rect x="4" y="16" width="80" height="8" rx="1"/>
      <rect x="4" y="28" width="80" height="18" rx="1"/>
      <rect x="4" y="50" width="80" height="18" rx="1"/>
      <rect x="4" y="72" width="80" height="18" rx="1"/>
      <rect x="4" y="94" width="80" height="35" rx="1"/>
      <rect x="4" y="133" width="80" height="35" rx="1"/>
      <rect x="4" y="172" width="80" height="35" rx="1"/>
      <rect x="4" y="211" width="80" height="18" rx="1"/>
      <rect x="4" y="233" width="80" height="18" rx="1"/>
      <rect x="4" y="255" width="80" height="10" rx="1"/>
    </g>
    <circle cx="76" cy="37" r="2.5" fill="#48bba2" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.2;0.9" dur="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="76" cy="59" r="2.5" fill="#48bba2" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="76" cy="81" r="2.5" fill="#48bba2" opacity="0.5"/>
    <!-- IO lights bar on large unit -->
    <rect x="10" y="104" width="4" height="4" rx="1" fill="#48bba2" opacity="0.7"/>
    <rect x="18" y="104" width="4" height="4" rx="1" fill="#1a3a2a" opacity="0.4"/>
    <rect x="26" y="104" width="4" height="4" rx="1" fill="#48bba2" opacity="0.9"/>
    <rect x="34" y="104" width="4" height="4" rx="1" fill="#48bba2" opacity="0.6"/>
    <rect x="42" y="104" width="4" height="4" rx="1" fill="#1a3a2a" opacity="0.4"/>
  </g>

  <!-- CENTER: IBM z-series mainframe - the hero piece -->
  <g transform="translate(260, 30)">
    <!-- Main body -->
    <rect x="0" y="0" width="240" height="440" rx="6" fill="#0d1218" stroke="#1a2a38" stroke-width="2"/>
    <!-- Front panel texture - geometric diamond IBM z16 style -->
    <rect x="8" y="8" width="224" height="424" rx="4" fill="#0c1016"/>

    <!-- Geometric diamond pattern (IBM z16 signature) -->
    <g opacity="0.15" fill="#1a3040">
      <!-- Large diamonds -->
      <polygon points="120,60 160,120 120,180 80,120"/>
      <polygon points="120,180 160,240 120,300 80,240"/>
      <polygon points="120,300 160,360 120,420 80,360"/>
      <!-- Side diamonds -->
      <polygon points="40,120 80,180 40,240 0,180" transform="translate(8,0)"/>
      <polygon points="200,120 240,180 200,240 160,180" transform="translate(8,0)"/>
    </g>

    <!-- Teal accent panel top -->
    <rect x="8" y="8" width="224" height="50" rx="4" fill="#0a1820"/>
    <rect x="8" y="8" width="224" height="50" rx="0" fill="none" stroke="#48bba2" stroke-width="0.5" opacity="0.3"/>

    <!-- IBM z logo area -->
    <text x="120" y="36" font-family="'Courier New', monospace" font-size="14" fill="#48bba2" text-anchor="middle" font-weight="bold" letter-spacing="2">IBM z16</text>

    <!-- Status lights row -->
    <g transform="translate(24, 70)">
      <circle cx="0" cy="0" r="4" fill="#48bba2" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="16" cy="0" r="4" fill="#48bba2" opacity="0.7">
        <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="32" cy="0" r="4" fill="#48bba2" opacity="0.85">
        <animate attributeName="opacity" values="0.85;0.2;0.85" dur="0.9s" repeatCount="indefinite"/>
      </circle>
      <circle cx="48" cy="0" r="4" fill="#48bba2" opacity="0.5"/>
      <circle cx="64" cy="0" r="4" fill="#1a3a2a" opacity="0.4"/>
      <circle cx="80" cy="0" r="4" fill="#48bba2" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0.1;0.8" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="96" cy="0" r="4" fill="#48bba2" opacity="0.6"/>
      <circle cx="112" cy="0" r="4" fill="#48bba2" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.3;0.9" dur="0.7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="128" cy="0" r="4" fill="#1a3a2a" opacity="0.3"/>
      <circle cx="144" cy="0" r="4" fill="#48bba2" opacity="0.7"/>
      <circle cx="160" cy="0" r="4" fill="#48bba2" opacity="0.5"/>
      <circle cx="176" cy="0" r="4" fill="#48bba2" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.6s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- I/O drawer sections -->
    <g transform="translate(16, 96)">
      <rect x="0" y="0" width="208" height="40" rx="2" fill="#0a0e14" stroke="#1a2a38" stroke-width="1"/>
      <text x="8" y="14" font-family="'Courier New', monospace" font-size="7" fill="#2a5a4a">I/O SUBSYSTEM — CHANNEL PATH ACTIVE</text>
      <rect x="8" y="20" width="192" height="12" rx="1" fill="#0c1218"/>
      <!-- Channel activity -->
      <rect x="10" y="22" width="6" height="8" rx="1" fill="#48bba2" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0.1;0.8" dur="0.5s" repeatCount="indefinite"/>
      </rect>
      <rect x="20" y="22" width="6" height="8" rx="1" fill="#48bba2" opacity="0.4"/>
      <rect x="30" y="22" width="6" height="8" rx="1" fill="#48bba2" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.1;0.9" dur="0.7s" repeatCount="indefinite"/>
      </rect>
      <rect x="40" y="22" width="6" height="8" rx="1" fill="#1a3a2a" opacity="0.3"/>
      <rect x="50" y="22" width="6" height="8" rx="1" fill="#48bba2" opacity="0.6"/>
      <rect x="60" y="22" width="6" height="8" rx="1" fill="#48bba2" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0.2;0.8" dur="0.9s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- Memory drawers (CPC drawers) -->
    <g transform="translate(16, 148)">
      <rect x="0" y="0" width="208" height="55" rx="2" fill="#0a0e14" stroke="#1a2a38" stroke-width="1"/>
      <text x="8" y="12" font-family="'Courier New', monospace" font-size="7" fill="#2a5a4a">CPC DRAWER 1 — 32 CORES ACTIVE</text>
      <rect x="8" y="18" width="192" height="30" rx="1" fill="#0d1318"/>
      <!-- Core grid -->
      <g fill="#48bba2">
        <rect x="12" y="22" width="7" height="7" rx="1" opacity="0.8"/>
        <rect x="23" y="22" width="7" height="7" rx="1" opacity="0.9">
          <animate attributeName="opacity" values="0.9;0.4;0.9" dur="0.8s" repeatCount="indefinite"/>
        </rect>
        <rect x="34" y="22" width="7" height="7" rx="1" opacity="0.7"/>
        <rect x="45" y="22" width="7" height="7" rx="1" opacity="0.85"/>
        <rect x="56" y="22" width="7" height="7" rx="1" opacity="0.6">
          <animate attributeName="opacity" values="0.6;0.9;0.6" dur="1.1s" repeatCount="indefinite"/>
        </rect>
        <rect x="67" y="22" width="7" height="7" rx="1" opacity="0.75"/>
        <rect x="78" y="22" width="7" height="7" rx="1" opacity="0.9">
          <animate attributeName="opacity" values="0.9;0.3;0.9" dur="0.6s" repeatCount="indefinite"/>
        </rect>
        <rect x="89" y="22" width="7" height="7" rx="1" opacity="0.8"/>
        <rect x="12" y="33" width="7" height="7" rx="1" opacity="0.7"/>
        <rect x="23" y="33" width="7" height="7" rx="1" opacity="0.85"/>
        <rect x="34" y="33" width="7" height="7" rx="1" opacity="0.9">
          <animate attributeName="opacity" values="0.9;0.4;0.9" dur="1.3s" repeatCount="indefinite"/>
        </rect>
        <rect x="45" y="33" width="7" height="7" rx="1" opacity="0.6"/>
        <rect x="56" y="33" width="7" height="7" rx="1" opacity="0.8"/>
        <rect x="67" y="33" width="7" height="7" rx="1" opacity="0.7">
          <animate attributeName="opacity" values="0.7;0.2;0.7" dur="0.9s" repeatCount="indefinite"/>
        </rect>
        <rect x="78" y="33" width="7" height="7" rx="1" opacity="0.9"/>
        <rect x="89" y="33" width="7" height="7" rx="1" opacity="0.75"/>
      </g>
    </g>

    <!-- More drawers -->
    <g transform="translate(16, 214)">
      <rect x="0" y="0" width="208" height="55" rx="2" fill="#0a0e14" stroke="#1a2a38" stroke-width="1"/>
      <text x="8" y="12" font-family="'Courier New', monospace" font-size="7" fill="#2a5a4a">CPC DRAWER 2 — 32 CORES ACTIVE</text>
      <rect x="8" y="18" width="192" height="30" rx="1" fill="#0d1318"/>
      <g fill="#48bba2">
        <rect x="12" y="22" width="7" height="7" rx="1" opacity="0.9"/>
        <rect x="23" y="22" width="7" height="7" rx="1" opacity="0.7"/>
        <rect x="34" y="22" width="7" height="7" rx="1" opacity="0.85">
          <animate attributeName="opacity" values="0.85;0.3;0.85" dur="0.7s" repeatCount="indefinite"/>
        </rect>
        <rect x="45" y="22" width="7" height="7" rx="1" opacity="0.6"/>
        <rect x="56" y="22" width="7" height="7" rx="1" opacity="0.9"/>
        <rect x="67" y="22" width="7" height="7" rx="1" opacity="0.75">
          <animate attributeName="opacity" values="0.75;0.2;0.75" dur="1.4s" repeatCount="indefinite"/>
        </rect>
        <rect x="78" y="22" width="7" height="7" rx="1" opacity="0.8"/>
        <rect x="89" y="22" width="7" height="7" rx="1" opacity="0.6"/>
      </g>
    </g>

    <!-- DS8900 storage drawers -->
    <g transform="translate(16, 280)">
      <rect x="0" y="0" width="208" height="30" rx="2" fill="#0a0e14" stroke="#1a2a38" stroke-width="1"/>
      <text x="8" y="12" font-family="'Courier New', monospace" font-size="7" fill="#2a5a4a">DS8900F — FLASH STORAGE</text>
      <text x="8" y="24" font-family="'Courier New', monospace" font-size="7" fill="#1a4a3a">64TB ALLOCATED / 98.2% UTIL</text>
    </g>

    <!-- Power/cable bottom -->
    <rect x="16" y="322" width="208" height="18" rx="2" fill="#080c10" stroke="#141e28" stroke-width="1"/>
    <text x="120" y="335" font-family="'Courier New', monospace" font-size="7" fill="#1a3a2a" text-anchor="middle">POWER SUBSYSTEM</text>

    <!-- Bottom section blank -->
    <rect x="16" y="350" width="208" height="82" rx="2" fill="#080c10" stroke="#101820" stroke-width="0.5"/>
    <!-- Ventilation slots -->
    <g stroke="#141e28" stroke-width="0.5">
      <line x1="20" y1="360" x2="220" y2="360"/>
      <line x1="20" y1="368" x2="220" y2="368"/>
      <line x1="20" y1="376" x2="220" y2="376"/>
      <line x1="20" y1="384" x2="220" y2="384"/>
      <line x1="20" y1="392" x2="220" y2="392"/>
      <line x1="20" y1="400" x2="220" y2="400"/>
      <line x1="20" y1="408" x2="220" y2="408"/>
      <line x1="20" y1="416" x2="220" y2="416"/>
      <line x1="20" y1="424" x2="220" y2="424"/>
